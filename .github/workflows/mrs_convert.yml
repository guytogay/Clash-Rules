name: Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Prepare Ruleset
        run: |
          # 构造标准 YAML 格式
          echo "payload:" > temp.yaml
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> temp.yaml

      - name: Convert to MRS
        uses: MetaCubeX/work-with-ruleset@main
        with:
          files: |
            temp.yaml
          # 转换后的后缀名
          format: mrs

      - name: Commit and Push
        run: |
          # 将转换生成的 temp.mrs 改名为 ken_fix.mrs 并移回 rules 文件夹
          mv temp.mrs rules/ken_fix.mrs
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add rules/ken_fix.mrs
          git commit -m "Auto-convert rules to MRS via Tool" || exit 0
          git push

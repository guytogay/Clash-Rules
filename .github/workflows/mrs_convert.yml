name: Auto Build Classical YAML

on:
  push:
    paths:
      - 'rules/ken_fix.list'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Classical YAML
        run: |
          # 1. 强制构造 payload 头部
          echo "payload:" > rules/ken_fix.yaml
          
          # 2. 从 list 文件提取有效规则并添加 YAML 缩进
          # 逻辑：排除注释(#)和空行(^$) -> 在每行前面加两个空格和连字符
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> rules/ken_fix.yaml
          
          # 3. 在日志中打印结果，方便我们调试
          echo "--- Generated YAML Contents ---"
          cat rules/ken_fix.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add rules/ken_fix.yaml
          # 只有当文件真正变化时才提交，防止死循环
          git commit -m "chore: auto update ken_fix.yaml" || exit 0
          git push

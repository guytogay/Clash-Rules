name: Auto Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert ken_fix.list to MRS
        uses: MetaCubeX/work-with-ruleset@main
        with:
          # 只要你修改了 rules 文件夹里的 .list，它就自动干活
          files: |
            rules/ken_fix.list
          format: mrs

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 官方工具转换后的文件默认在根目录，我们把它移回 rules
          mv ken_fix.mrs rules/ken_fix.mrs
          git add rules/ken_fix.mrs
          git commit -m "chore: auto update mrs" || exit 0
          git push

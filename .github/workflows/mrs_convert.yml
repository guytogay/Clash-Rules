name: Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/**' # 只有当你修改 rules 文件夹里的内容时才触发
  workflow_dispatch: # 支持手动触发

# 赋予 Action 写入仓库的权限
permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Mihomo
        run: |
          # 下载最新的 Mihomo 内核
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.1/mihomo-linux-amd64-v1.18.1.gz
          gunzip mihomo-linux-amd64-v1.18.1.gz
          mv mihomo-linux-amd64-v1.18.1 mihomo
          chmod +x mihomo

      - name: Convert to MRS
        run: |
          # 1. 构造临时的 YAML 格式 payload
          echo "payload:" > temp.yaml
          # 2. 从 list 文件读取内容，排除掉注释和空行，并添加 YAML 缩进
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> temp.yaml
          # 3. 执行转换命令
          ./mihomo convert ruleset temp.yaml rules/ken_fix.mrs
          # 4. 删除临时文件
          rm temp.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add rules/ken_fix.mrs
          # 如果文件没有变化，就不提交以免报错
          git commit -m "Auto-convert ken_fix.list to ken_fix.mrs" || exit 0
          git push

name: Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Mihomo
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.1/mihomo-linux-amd64-v1.18.1.gz
          gunzip mihomo-linux-amd64-v1.18.1.gz
          mv mihomo-linux-amd64-v1.18.1 mihomo
          chmod +x mihomo

      - name: Convert to MRS
        run: |
          # 1. 强制生成一个空的配置文件，骗过 mihomo 的启动自检
          echo "mode: rule" > config.yaml
          
          # 2. 构造转换用的 payload
          echo "payload:" > temp.yaml
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> temp.yaml
          
          # 3. 执行转换指令，确保不带任何多余参数
          ./mihomo convert ruleset temp.yaml rules/ken_fix.mrs
          
          echo "Success: MRS file generated."

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          if [ -f rules/ken_fix.mrs ]; then
            git add rules/ken_fix.mrs
            git commit -m "Auto-convert rules to MRS" || exit 0
            git push
          else
            echo "Error: MRS file was not created"
            exit 1
          fi

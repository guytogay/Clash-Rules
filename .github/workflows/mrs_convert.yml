name: Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Mihomo
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/download/v1.18.1/mihomo-linux-amd64-v1.18.1.gz
          gunzip mihomo-linux-amd64-v1.18.1.gz
          mv mihomo-linux-amd64-v1.18.1 mihomo
          chmod +x mihomo

      - name: Convert to MRS
        run: |
          # 1. 构造 YAML
          echo "payload:" > temp.yaml
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> temp.yaml
          
          # 2. 这里的重点：使用连字符格式命令，并且绝不给它启动的机会
          ./mihomo convert-ruleset classical temp.yaml rules/ken_fix.mrs
          
          echo "Conversion finished."

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          if [ -f rules/ken_fix.mrs ]; then
            git add rules/ken_fix.mrs
            git commit -m "Auto-convert to MRS" || exit 0
            git push
          else
            echo "Failed to create MRS"
            exit 1
          fi

name: Auto Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/ken_fix.list'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert to MRS via API
        run: |
          # 1. 构造标准的 YAML 格式
          echo "payload:" > temp.yaml
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> temp.yaml
          
          # 2. 调用官方转换 API（这是目前最稳的方法，不依赖本地环境）
          curl -F "file=@temp.yaml" -F "output=mrs" https://converter.metacubex.one/convert -o rules/ken_fix.mrs
          
          echo "Conversion finished via API."

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add rules/ken_fix.mrs
          git commit -m "chore: auto update mrs via api" || exit 0
          git push

name: Auto Convert Rules to MRS

on:
  push:
    paths:
      - 'rules/ken_fix.list'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Mihomo Tool
        run: |
          go install github.com/MetaCubeX/mihomo@latest

      - name: Convert to MRS
        run: |
          # 1. 构造标准的 YAML 格式
          echo "payload:" > temp.yaml
          grep -v '^#' rules/ken_fix.list | grep -v '^$' | sed 's/^/  - /' >> temp.yaml
          
          # 2. 使用安装好的 mihomo 工具转换
          ~/go/bin/mihomo convert ruleset temp.yaml rules/ken_fix.mrs
          
          echo "Conversion completed."

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add rules/ken_fix.mrs
          git commit -m "chore: auto update mrs" || exit 0
          git push

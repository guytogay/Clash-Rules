name: Find Rules in Official Meta

on:
  push:
    paths:
      - 'rules/search.txt'
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Search Domain in Official Text
        run: |
          # 1. 下载官方最完整的 domain 文本列表 (这是个大文本，大约 20MB)
          # 这个文件里包含了所有分类和对应的域名，是纯文本格式
          curl -sL https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/all.yaml -o official_all.yaml || \
          curl -sL https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite.dat -o official_all.yaml

          echo "开始全库深度匹配..."
          
          while read -r domain; do
            [[ -z "$domain" || "$domain" =~ ^# ]] && continue
            echo "------------------------------------"
            echo "🔍 正在搜索域名: $domain ..."
            
            # 使用 grep 搜索域名，并打印它上方的分类名 (通常分类名后面带着冒号)
            # 我们直接把包含这个域名的文件的“段落头”抓出来
            # 逻辑：搜到域名后，向上找最近的一个以字母开头并以冒号结尾的行
            result=$(grep -B 100 "$domain" official_all.yaml | grep -E '^[a-zA-Z0-9-]+:' | tail -n 1 || true)
            
            if [ -z "$result" ]; then
              echo "❌ 未在官方库中找到该域名"
            else
              echo "✅ 匹配到官方 Tag: $result"
            fi
          done < rules/search.txt
          echo "------------------------------------"

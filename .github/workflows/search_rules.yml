name: Find Rules in Official Meta

on:
  push:
    paths:
      - 'rules/search.txt'
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deep Search Official Rules
        run: |
          # 1. 下载官方所有域名规则的汇总文本（这是最全的数据源）
          curl -sL https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite.dat -o geosite.dat
          
          # 2. 读取你想要搜的域名
          for domain in $(grep -v '^#' rules/search.txt | grep -v '^$'); do
            echo "------------------------------------"
            echo "🔍 正在搜索域名: $domain ..."
            # 利用 grep 查找域名，并显示它所属的分类标题
            # 逻辑：查找域名，并显示匹配行之前的第一个以字母开头且带冒号的行（通常是分类名）
            grep -B 50 "$domain" geosite.dat | grep '^[a-zA-Z0-9-]\+:' | tail -n 1 || echo "❌ 未在官方库中找到该域名"
          done
          echo "------------------------------------"

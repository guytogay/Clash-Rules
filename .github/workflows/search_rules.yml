name: Find Rules in Official Meta

on:
  push:
    paths:
      - 'rules/search.txt'
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deep Search Official Rules
        run: |
          # 1. 下载官方二进制数据
          curl -sL https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite.dat -o geosite.dat
          
          # 2. 【核心】将二进制转换为纯文本，方便搜索
          # 我们利用 strings 命令把里面的文本全抓出来
          strings geosite.dat > decoded.txt
          
          echo "开始全库扫描..."
          
          # 3. 读取 search.txt 并搜索
          while read -r domain; do
            [[ -z "$domain" || "$domain" =~ ^# ]] && continue
            echo "------------------------------------"
            echo "🔍 正在搜索域名: $domain ..."
            
            # 在解码后的文本里找域名，并向上找最近的分类名
            # 官方格式通常是 分类名 在前，域名在后
            grep -B 100 "$domain" decoded.txt | grep ":" | tail -n 1 || echo "❌ 未在官方库中找到该域名"
          done < rules/search.txt
          echo "------------------------------------"

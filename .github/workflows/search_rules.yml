name: Find Rules in Official Meta

on:
  push:
    paths:
      - 'rules/search.txt'
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Clone Official Source Code
        run: |
          # 深度克隆官方的域名规则源代码（只拉取数据部分，速度很快）
          git clone --depth 1 https://github.com/MetaCubeX/meta-rules-dat.git official_data

      - name: Search Domain in Source
        run: |
          echo "开始全库深度匹配..."
          
          while read -r domain; do
            [[ -z "$domain" || "$domain" =~ ^# ]] && continue
            echo "------------------------------------"
            echo "🔍 正在搜索域名: $domain ..."
            
            # 在官方 data 目录下递归搜索包含该域名的文件
            # -r 递归, -l 只显示文件名, -w 全字匹配
            result=$(grep -rl "$domain" official_data/data/ || true)
            
            if [ -z "$result" ]; then
              echo "❌ 未在官方库中找到该域名"
            else
              echo "✅ 匹配到以下官方文件(Tag):"
              # 格式化输出文件名
              echo "$result" | sed 's|official_data/data/||g'
            fi
          done < rules/search.txt
          echo "------------------------------------"
